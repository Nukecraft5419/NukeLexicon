name: Java CI with Gradle

# Trigger the workflow on pushes and pull requests to the main branches
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin' # Official recommended Eclipse Temurin distribution

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5 # Automatically caches dependencies to speed up future builds

      - name: Build and Test API
        # Run the build task and generate javadocs to ensure no compilation errors exist
        run: ./gradlew build javadoc
