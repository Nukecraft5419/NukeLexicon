name: 🚀 Deploy to Maven Repo

# Define when this workflow should run
on:
  push:
    tags:
      - 'v*.*.*' # Triggers automatically ONLY when a version tag is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  publish:
    name: 📤 Deploy Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout NukeLexicon Repository
        uses: actions/checkout@v6

      - name: ☕ Setup Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🐘 Setup Gradle
        # Optional but recommended: Enables caching for faster builds
        uses: gradle/actions/setup-gradle@v5

      - name: 🔨 Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: 📦 Generate Maven Artifacts
        # Generates JAR, Javadoc, Sources, and POM in build/repo/
        run: ./gradlew publish

      - name: 📂 Checkout Target Maven Repository
        uses: actions/checkout@v6
        with:
          repository: nukecraft5419/maven-repo
          token: ${{ secrets.MAVEN_TOKEN }}
          path: maven-repo-dir # Clones the target repo into this temporary directory

      - name: 🚀 Copy Artifacts and Push to Maven Repository
        run: |
          echo "📂 Copying generated artifacts into the repository..."
          cp -r build/repo/* maven-repo-dir/

          cd maven-repo-dir

          echo "⚙️ Configuring Git bot identity..."
          # Using the official GitHub Actions Bot ID for the verified avatar
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "📤 Staging and Committing..."
          git add .

          # Commit the changes using the current tag/branch name, or skip if no changes
          git commit -m "deploy(api): 🚀 Auto-deploy version ${{ github.ref_name }}" || echo "No changes to commit"

          echo "🚀 Pushing to maven-repo..."
          git push
