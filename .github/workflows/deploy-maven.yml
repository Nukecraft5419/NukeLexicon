name: Deploy to Maven Repo

# Define when this workflow should run
on:
  push:
    tags:
      - 'v*.*.*' # Triggers automatically ONLY when a release tag is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout NukeLexicon Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔨 Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew

      - name: 📦 Generate Maven Artifacts (JAR, Javadoc, Sources, POM)
        run: ./gradlew publish

      - name: 📂 Checkout Target Maven Repository
        uses: actions/checkout@v4
        with:
          repository: nukecraft5419/maven-repo
          token: ${{ secrets.MAVEN_TOKEN }}
          path: maven-repo-dir # Clones the target repo into this temporary directory

      - name: 🚀 Copy Artifacts and Push to Maven Repository
        run: |
          # Copy all generated artifacts (from dev/...) into the target repository
          cp -r build/repo/* maven-repo-dir/

          # Navigate into the target repository directory
          cd maven-repo-dir

          # Configure Git bot identity for the commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all new files
          git add .

          # Commit the changes using the current tag/branch name, or skip if no changes
          git commit -m "release: 🚀 Auto-deploy version ${{ github.ref_name }}" || echo "No changes to commit"

          # Push the new artifacts to the Maven repository
          git push
